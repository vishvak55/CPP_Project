name: Deploy ToolShare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  DYNAMODB_TABLE: toolshare-prod
  S3_BUCKET: toolshare-files-prod-vishvak
  FRONTEND_BUCKET: toolshare-frontend-prod-vishvak
  LAMBDA_FUNCTION: toolshare-api
  LAMBDA_ROLE: toolshare-lambda-role
  SNS_TOPIC: toolshare-notifications
  API_NAME: toolshare-api

jobs:
  test-library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install library and run tests
        run: |
          cd library
          pip install -e .
          pip install pytest
          python -m pytest tests/ -v --tb=short

  deploy-backend:
    needs: test-library
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create DynamoDB table
        run: |
          if ! aws dynamodb describe-table --table-name $DYNAMODB_TABLE 2>/dev/null; then
            aws dynamodb create-table \
              --table-name $DYNAMODB_TABLE \
              --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S \
              --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
              --billing-mode PAY_PER_REQUEST
            aws dynamodb wait table-exists --table-name $DYNAMODB_TABLE
          fi

      - name: Create S3 bucket
        run: |
          if ! aws s3api head-bucket --bucket $S3_BUCKET 2>/dev/null; then
            aws s3api create-bucket --bucket $S3_BUCKET \
              --region $AWS_REGION \
              --create-bucket-configuration LocationConstraint=$AWS_REGION
          fi

      - name: Create SNS topic
        run: |
          SNS_ARN=$(aws sns create-topic --name $SNS_TOPIC --query 'TopicArn' --output text)
          echo "SNS_TOPIC_ARN=$SNS_ARN" >> $GITHUB_ENV

      - name: Create IAM role
        run: |
          if ! aws iam get-role --role-name $LAMBDA_ROLE 2>/dev/null; then
            aws iam create-role \
              --role-name $LAMBDA_ROLE \
              --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"lambda.amazonaws.com"},"Action":"sts:AssumeRole"}]}'
            aws iam attach-role-policy --role-name $LAMBDA_ROLE \
              --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
            aws iam attach-role-policy --role-name $LAMBDA_ROLE \
              --policy-arn arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess
            aws iam attach-role-policy --role-name $LAMBDA_ROLE \
              --policy-arn arn:aws:iam::aws:policy/AmazonS3FullAccess
            aws iam attach-role-policy --role-name $LAMBDA_ROLE \
              --policy-arn arn:aws:iam::aws:policy/AmazonSNSFullAccess
            sleep 10
          fi
          ROLE_ARN=$(aws iam get-role --role-name $LAMBDA_ROLE --query 'Role.Arn' --output text)
          echo "ROLE_ARN=$ROLE_ARN" >> $GITHUB_ENV

      - name: Package Lambda
        run: |
          cd backend
          zip -r ../function.zip lambda_function.py

      - name: Deploy Lambda
        run: |
          if aws lambda get-function --function-name $LAMBDA_FUNCTION 2>/dev/null; then
            aws lambda update-function-code \
              --function-name $LAMBDA_FUNCTION \
              --zip-file fileb://function.zip
          else
            aws lambda create-function \
              --function-name $LAMBDA_FUNCTION \
              --runtime python3.11 \
              --handler lambda_function.lambda_handler \
              --role $ROLE_ARN \
              --zip-file fileb://function.zip \
              --timeout 30 \
              --memory-size 256 \
              --environment "Variables={DYNAMODB_TABLE=$DYNAMODB_TABLE,S3_BUCKET=$S3_BUCKET,SNS_TOPIC_ARN=$SNS_TOPIC_ARN,REGION=$AWS_REGION,JWT_SECRET=toolshare-secret-2026}"
          fi

      - name: Setup API Gateway
        run: |
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='$API_NAME'].id" --output text --region $AWS_REGION)
          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            API_ID=$(aws apigateway create-rest-api --name "$API_NAME" --endpoint-configuration types=REGIONAL --query 'id' --output text --region $AWS_REGION)
          fi
          echo "API_ID=$API_ID" >> $GITHUB_ENV

          ROOT_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?path=='/'].id" --output text --region $AWS_REGION)

          PROXY_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?pathPart=='{proxy+}'].id" --output text --region $AWS_REGION)
          if [ -z "$PROXY_ID" ] || [ "$PROXY_ID" = "None" ]; then
            PROXY_ID=$(aws apigateway create-resource --rest-api-id $API_ID --parent-id $ROOT_ID --path-part '{proxy+}' --query 'id' --output text --region $AWS_REGION)
          fi

          LAMBDA_ARN=$(aws lambda get-function --function-name $LAMBDA_FUNCTION --query 'Configuration.FunctionArn' --output text --region $AWS_REGION)
          LAMBDA_URI="arn:aws:apigateway:${AWS_REGION}:lambda:path/2015-03-31/functions/${LAMBDA_ARN}/invocations"

          # ANY on proxy
          aws apigateway put-method --rest-api-id $API_ID --resource-id $PROXY_ID --http-method ANY --authorization-type NONE --request-parameters "method.request.path.proxy=true" --region $AWS_REGION 2>/dev/null || true
          aws apigateway put-integration --rest-api-id $API_ID --resource-id $PROXY_ID --http-method ANY --type AWS_PROXY --integration-http-method POST --uri "$LAMBDA_URI" --region $AWS_REGION

          # OPTIONS on proxy for CORS
          aws apigateway put-method --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --authorization-type NONE --region $AWS_REGION 2>/dev/null || true
          aws apigateway put-method-response --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --status-code 200 --response-parameters "method.response.header.Access-Control-Allow-Headers=true,method.response.header.Access-Control-Allow-Methods=true,method.response.header.Access-Control-Allow-Origin=true" --region $AWS_REGION 2>/dev/null || true
          aws apigateway put-integration --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --type MOCK --request-templates '{"application/json": "{\"statusCode\": 200}"}' --region $AWS_REGION
          aws apigateway put-integration-response --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --status-code 200 --response-parameters '{"method.response.header.Access-Control-Allow-Headers":"'"'"'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"'"'","method.response.header.Access-Control-Allow-Methods":"'"'"'GET,POST,PUT,DELETE,OPTIONS'"'"'","method.response.header.Access-Control-Allow-Origin":"'"'"'*'"'"'"}' --region $AWS_REGION

          # ANY on root
          aws apigateway put-method --rest-api-id $API_ID --resource-id $ROOT_ID --http-method ANY --authorization-type NONE --region $AWS_REGION 2>/dev/null || true
          aws apigateway put-integration --rest-api-id $API_ID --resource-id $ROOT_ID --http-method ANY --type AWS_PROXY --integration-http-method POST --uri "$LAMBDA_URI" --region $AWS_REGION

          # Lambda permission
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws lambda add-permission --function-name $LAMBDA_FUNCTION \
            --statement-id apigateway-invoke-$(date +%s) \
            --action lambda:InvokeFunction \
            --principal apigateway.amazonaws.com \
            --source-arn "arn:aws:execute-api:${AWS_REGION}:${ACCOUNT_ID}:${API_ID}/*" --region $AWS_REGION 2>/dev/null || true

          # Deploy
          aws apigateway create-deployment --rest-api-id $API_ID --stage-name prod --region $AWS_REGION
          echo "API URL: https://${API_ID}.execute-api.${AWS_REGION}.amazonaws.com/prod"

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API URL
        run: |
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='$API_NAME'].id" --output text)
          echo "VITE_API_URL=https://${API_ID}.execute-api.${AWS_REGION}.amazonaws.com/prod" >> $GITHUB_ENV

      - name: Build frontend
        run: |
          cd frontend
          npm install
          echo "VITE_API_URL=$VITE_API_URL" > .env
          npm run build

      - name: Create frontend S3 bucket
        run: |
          if ! aws s3api head-bucket --bucket $FRONTEND_BUCKET 2>/dev/null; then
            aws s3api create-bucket --bucket $FRONTEND_BUCKET \
              --region $AWS_REGION \
              --create-bucket-configuration LocationConstraint=$AWS_REGION
          fi
          aws s3 website s3://$FRONTEND_BUCKET --index-document index.html --error-document index.html
          aws s3api put-public-access-block --bucket $FRONTEND_BUCKET \
            --public-access-block-configuration BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false
          aws s3api put-bucket-policy --bucket $FRONTEND_BUCKET --policy "{
            \"Version\": \"2012-10-17\",
            \"Statement\": [{
              \"Sid\": \"PublicRead\",
              \"Effect\": \"Allow\",
              \"Principal\": \"*\",
              \"Action\": \"s3:GetObject\",
              \"Resource\": \"arn:aws:s3:::${FRONTEND_BUCKET}/*\"
            }]
          }"

      - name: Deploy frontend
        run: |
          aws s3 sync frontend/dist s3://$FRONTEND_BUCKET --delete
          echo "Frontend URL: http://${FRONTEND_BUCKET}.s3-website-${AWS_REGION}.amazonaws.com"
